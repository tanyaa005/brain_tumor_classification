<!DOCTYPE html>
<html>
<head>
    <title>Login - Brain Tumor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .login-card {
            max-width: 400px;
            margin: auto;
            margin-top: 80px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            background: white;
        }
        .title {
            text-align: center;
            margin-top: 30px;
            font-weight: bold;
        }
        .brain-img {
            display: block;
            margin: 0 auto 15px;
            width: 80px;
        }
    </style>
</head>

<body>

<!-- Center Heading -->
<h2 class="title">🧠 Brain Tumor Classification</h2>

<!-- Login Card -->
<div class="login-card">

    <!-- Image -->
    <img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png" class="brain-img">

    <h4 class="text-center mb-3">Login</h4>

    <form id="loginForm">
        <input type="text" id="username" class="form-control mb-2" placeholder="Username" required>
        <input type="password" id="password" class="form-control mb-2" placeholder="Password" required>

        <button class="btn btn-primary w-100">Login</button>
    </form>

    <p class="mt-3 text-center">
        New user? <a href="/auth/register">Register</a>
    </p>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const res = await fetch("/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });

    const data = await res.json();

    if(data.success){
        localStorage.setItem("token", data.data.access_token);
        window.location.href = "/predict";
    } else {
        alert(data.message);
    }
});
</script>

</body>
</html>
