<!DOCTYPE html>
<html>
<head>
    <title>Register - Brain Tumor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
            margin-top: 60px;
        }
        .title {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .brain-img {
            display: block;
            margin: 0 auto 10px;
            width: 70px;
        }
    </style>
</head>

<body>

<div class="form-container">

    <img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png" class="brain-img">
    <h3 class="title">🧠 Brain Tumor Classification</h3>

    <h5 class="mb-3 text-center">Create Account</h5>

    <form id="registerForm">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Enter email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password" required>
        </div>

        <button class="btn btn-success w-100">Register</button>

    </form>

    <p class="mt-3 text-center">
        Already have account? <a href="/auth/login">Login</a>
    </p>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const res = await fetch("/auth/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            email: email.value,
            password: password.value
        })
    });

    const data = await res.json();

    if(data.success){
        alert("Registration successful!");
        window.location.href = "/auth/login";
    } else {
        alert(data.message);
    }
});
</script>

</body>
</html>
